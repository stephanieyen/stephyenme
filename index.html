<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="#" data-page="home">Home</a></li>
            <li><a href="#" data-page="about">About</a></li>
        </ul>
    </nav>

    <div class="container">
        <!-- Home Page -->
        <div id="home" class="page active">
            <div class="hero postcard" onclick="toggleOverview(event)">
                <h1 id="name"></h1>
                <p class="subtitle" id="tagline"></p>
                <p id="welcomeText"></p>
                <button class="expand-btn" onclick="toggleOverview(event)">Read more ↓</button>
                
                <div class="expandable-content" id="overviewExpanded"></div>
            </div>

            <div class="grid">
                <div class="card" onclick="toggleCard(this)">
                    <h3>
                        <span id="techTitle"></span>
                        <span class="expand-icon">↓</span>
                    </h3>
                    <p id="techSummary"></p>
                    <div class="card-content" id="techDetails"></div>
                    <div class="card-stack" id="techStack"></div>
                </div>

                <div class="card" onclick="toggleCard(this)">
                    <h3>
                        <span id="writingTitle"></span>
                        <span class="expand-icon">↓</span>
                    </h3>
                    <p id="writingSummary"></p>
                    <div class="card-content" id="writingDetails"></div>
                    <div class="card-stack" id="writingStack"></div>
                </div>

                <div class="card" onclick="toggleCard(this)">
                    <h3>
                        <span id="musicTitle"></span>
                        <span class="expand-icon">↓</span>
                    </h3>
                    <p id="musicSummary"></p>
                    <div class="card-content" id="musicDetails"></div>
                    <div class="card-stack" id="musicStack"></div>
                </div>
            </div>
        </div>

        <!-- About Page -->
        <div id="about" class="page">
            <div class="postcard">
                <h1>About</h1>
                <p id="aboutIntro"></p>
            </div>
            
            <div class="postcard">
                <h2>Tech Startups</h2>
                <p id="aboutTech"></p>
            </div>

            <div class="postcard">
                <h2>Writing</h2>
                <p id="aboutWriting"></p>
            </div>

            <div class="postcard">
                <h2>Music</h2>
                <p id="aboutMusic"></p>
            </div>

            <div class="postcard">
                <h2>Get In Touch</h2>
                <p id="aboutContact"></p>
            </div>
        </div>
    </div>

    <script src="content.js"></script>
    <script src="script.js"></script>
</body>
</html>
