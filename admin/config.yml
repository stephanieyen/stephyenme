backend:
  name: git-gateway
  branch: main # or master, depending on your default branch

media_folder: "images/uploads" # Where uploaded images will be stored
public_folder: "/images/uploads" # Public URL path

collections:
  - name: "writing" # Used in routes, e.g., /admin/collections/writing
    label: "Writing" # Used in the UI
    folder: "writing" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # Filename template
    fields: # The fields for each document
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Featured Image", name: "thumbnail", widget: "image", required: false}
      - {label: "Tags", name: "tags", widget: "list", required: false}

  - name: "projects"
    label: "Projects"
    folder: "projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Project Link", name: "link", widget: "string", required: false}
      - {label: "Featured Image", name: "thumbnail", widget: "image", required: false}